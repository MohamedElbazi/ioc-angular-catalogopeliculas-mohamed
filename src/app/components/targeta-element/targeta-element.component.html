<div class="targeta" role="region" [attr.aria-label]="element.nom">
  <h3>{{ element.nom | uppercase }}</h3>
  <p><strong>Gènere:</strong> {{ element.genere }}</p>
  <p><strong>Any:</strong> {{ element.any }}</p>
  <p><strong>Valoració:</strong> {{ element.valoracio | number:'1.1-1' }}</p>
  <p><strong>Descripció:</strong> {{ element.descripcio }}</p>
</div>
